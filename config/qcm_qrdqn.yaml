num_steps: 300_000
batch_size: 128
N: 200
kappa: 1.0
lr: 5.e-5
memory_size: 100_000
gamma: 1
multi_step: 3
update_interval: 1
target_update_interval: 2_000    # Was 5000 — update target net faster to avoid stale Q-values
start_steps: 20_000              # Was 10000 — more random exploration before learning
epsilon_train: 0.10              # 10% random actions — 5% was not enough to break nesting loops
epsilon_eval: 0.001
epsilon_decay_steps: 100_000     # Was 25000 — decay slower to maintain exploration longer
double_q_learning: False
dueling_net: False
noisy_net: False
use_per: True
log_interval: 100
eval_interval: 1_000
num_eval_steps: 125000
max_episode_steps: 27000
grad_cliping:
