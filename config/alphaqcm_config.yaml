seed: 42
device: "auto"

# Distributional RL settings
model: "qrdqn"      # Options: "qrdqn" or "iqn"
n_quantiles: 32
std_lambda: 1.0     # Weight of variance term in exploration bonus

# Factor pool
pool_size: 20
ic_threshold: 0.02
correlation_threshold: 0.7

# Training — match AlphaGen's 300k for fair comparison
n_episodes: 300000
batch_size: 128
learning_rate: 1.0e-4
eval_frequency: 500

# Small-scale test overrides
small_scale:
  max_symbols: 50
  n_episodes: 50000
  lookback_months: 3
