# Active source selection
source:
  name: "crypto"         # "crypto" or "qlib"
  target_horizon: 8      # bars ahead used by AlphaGen target
  bars_per_year: 8760    # 1H crypto default
  panel_dir: "data/qlib_cache"
  qlib:
    instruments: "csi500"
    start_date: "2020-01-01"
    end_date: "2023-12-31"
    dataset: "Alpha158"
    cache_dir: "data/qlib_cache"

# Binance data settings
binance:
  base_url: "https://data.binance.vision"  # Public bulk data (no rate limits)
  api_url: "https://fapi.binance.com"      # Futures API (for universe selection)
  concurrency: 20   # CDN downloads, no rate limit concerns

# Universe settings
universe:
  quote_asset: "USDT"
  min_24h_volume_usd: 1_000_000
  min_listing_months: 6
  max_symbols: 500
  exclude_stablecoins:
    - USDT
    - USDC
    - DAI
    - BUSD
    - TUSD
    - FDUSD
  exclude_leveraged_tokens: true  # filter out *UP, *DOWN, *BULL, *BEAR

# Data settings
data:
  interval: "1h"
  lookback_years: 2
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  alphagen_format_dir: "data/alphagen_format"

# Train/Val/Test split (chronological)
split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

# Forward return horizons
returns:
  - 1   # 1H forward return
  - 4   # 4H forward return
