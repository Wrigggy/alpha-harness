# Binance Futures API settings
binance:
  base_url: "https://fapi.binance.com"
  rate_limit: 2400  # futures API allows more requests per minute
  concurrency: 3    # keep low to avoid 418 rate limit on futures API
  kline_limit: 1500 # futures API allows up to 1500 per request

# Universe settings
universe:
  quote_asset: "USDT"
  min_24h_volume_usd: 1_000_000
  min_listing_months: 6
  max_symbols: 500
  exclude_stablecoins:
    - USDT
    - USDC
    - DAI
    - BUSD
    - TUSD
    - FDUSD
  exclude_leveraged_tokens: true  # filter out *UP, *DOWN, *BULL, *BEAR

# Data settings
data:
  interval: "1h"
  lookback_years: 2
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  alphagen_format_dir: "data/alphagen_format"

# Train/Val/Test split (chronological)
split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

# Forward return horizons
returns:
  - 1   # 1H forward return
  - 4   # 4H forward return
