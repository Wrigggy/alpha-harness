# Binance data settings
binance:
  base_url: "https://data.binance.vision"  # Public bulk data (no rate limits)
  api_url: "https://fapi.binance.com"      # Futures API (for universe selection)
  concurrency: 20   # CDN downloads, no rate limit concerns

# Universe settings
universe:
  quote_asset: "USDT"
  min_24h_volume_usd: 1_000_000
  min_listing_months: 6
  max_symbols: 500
  exclude_stablecoins:
    - USDT
    - USDC
    - DAI
    - BUSD
    - TUSD
    - FDUSD
  exclude_leveraged_tokens: true  # filter out *UP, *DOWN, *BULL, *BEAR

# Data settings
data:
  interval: "1h"
  lookback_years: 2
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  alphagen_format_dir: "data/alphagen_format"

# Train/Val/Test split (chronological)
split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

# Forward return horizons
returns:
  - 1   # 1H forward return
  - 4   # 4H forward return

# A-share (Qlib) settings — used when --data-source cn
cn:
  qlib_data_path: "~/.qlib/qlib_data/cn_data"
  instruments: "csi300"
  # Target: 10-day VWAP-to-VWAP forward return (AlphaGen paper alignment)
  # Train/val/test segments (chronological, non-overlapping)
  segments:
    train: ["2015-01-01", "2021-12-31"]
    val:   ["2022-01-01", "2022-12-31"]
    test:  ["2023-01-01", "2023-12-31"]
