seed: 42
device: "auto"  # auto-detect cuda/mps/cpu

# Search space
operators:
  unary:
    - "Abs"
    - "Sign"
    - "Log"
    - "Neg"
    - "Inv"
    - "Rank"
    - "Std20"
    - "Std5"
    - "Mean20"
    - "Mean5"
    - "Delta5"
    - "Delta20"
  binary:
    - "Add"
    - "Sub"
    - "Mul"
    - "Div"
    - "Greater"
    - "Less"
features:
  - "open"
  - "close"
  - "high"
  - "low"
  - "volume"
  - "vwap"
constants:
  - 0
  - 1
  - -1
  - 0.5
  - 2
max_expression_length: 20

# RL training
n_episodes: 50000
batch_size: 32
learning_rate: 1.0e-4
gamma: 0.99
ppo_clip: 0.2
entropy_coef: 0.01

# Factor pool
pool_size: 20
ic_threshold: 0.02
correlation_threshold: 0.7

# Evaluation
eval_frequency: 500

# Small-scale test overrides (for Mac development)
small_scale:
  max_symbols: 50
  n_episodes: 1000
  lookback_months: 3
